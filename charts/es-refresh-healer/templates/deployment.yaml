apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "es-refresh-healer.fullname" . }}
  labels:
    {{- include "es-refresh-healer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "es-refresh-healer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "es-refresh-healer.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "es-refresh-healer.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SCAN_INTERVAL
              value: {{ .Values.controller.scanInterval | quote }}
            - name: DEFAULT_REFRESH_INTERVAL
              value: {{ .Values.controller.defaultRefreshInterval | quote }}
            - name: STALE_MULTIPLIER
              value: {{ .Values.controller.staleMultiplier | quote }}
            - name: GRACE_SECONDS
              value: {{ .Values.controller.graceSeconds | quote }}
            - name: COOLDOWN_SECONDS
              value: {{ .Values.controller.cooldownSeconds | quote }}
            - name: MAX_PATCHES_PER_MINUTE
              value: {{ .Values.controller.maxPatchesPerMinute | quote }}
            - name: DRY_RUN
              value: {{ .Values.controller.dryRun | quote }}
            - name: WATCH_NAMESPACES
              value: {{ join "," .Values.controller.watchNamespaces | quote }}
            - name: DENY_NAMESPACES
              value: {{ join "," .Values.controller.denyNamespaces | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.controller.logLevel | quote }}
            - name: METRICS_ADDR
              value: {{ .Values.controller.metricsAddr | quote }}
            - name: LEADER_ELECT
              value: {{ .Values.controller.leaderElect | quote }}
            - name: EXTERNALSECRET_VERSION
              value: {{ .Values.controller.externalSecretVersion | quote }}
            - name: EMIT_EVENTS
              value: {{ .Values.controller.emitEvents | quote }}
            - name: ALLOW_ZERO_REFRESH_INTERVAL
              value: {{ .Values.controller.allowZeroRefreshInterval | quote }}
            - name: MAX_ALLOWED_LAG_SECONDS
              value: {{ .Values.controller.maxAllowedLagSeconds | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
