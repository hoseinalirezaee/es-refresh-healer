apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "es-refresh-healer.fullname" . }}
  labels:
    {{- include "es-refresh-healer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "es-refresh-healer.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "es-refresh-healer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

