name: chart

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Package chart with short-SHA identifiers
        run: |
          mkdir -p dist
          cp -R charts/es-refresh-healer /tmp/es-refresh-healer-chart
          sed -i "s/^appVersion:.*/appVersion: ${SHORT_SHA}/" /tmp/es-refresh-healer-chart/Chart.yaml
          sed -i "/^  tag:/s|.*|  tag: ${SHORT_SHA}|" /tmp/es-refresh-healer-chart/values.yaml
          helm lint /tmp/es-refresh-healer-chart
          helm package /tmp/es-refresh-healer-chart \
            --version "0.0.0-${SHORT_SHA}" \
            --app-version "$SHORT_SHA" \
            --destination dist

      - name: Checkout Helm repository branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: helm-repo
        continue-on-error: true

      - name: Prepare Helm repository
        run: |
          mkdir -p helm-repo
          find helm-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp dist/*.tgz helm-repo/
          helm repo index helm-repo --url "https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          cat > helm-repo/index.html <<'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>es-refresh-healer Helm repository</title></head>
            <body>
              <h1>es-refresh-healer Helm repository</h1>
              <p>Use: <code>helm repo add es-refresh-healer https://hoseinalirezaee.github.io/es-refresh-healer</code></p>
            </body>
          </html>
          EOF

      - name: Publish Helm repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: helm-repo
          keep_files: true

      - name: Upload short-SHA chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: es-refresh-healer-chart-${{ env.SHORT_SHA }}
          path: dist/es-refresh-healer-0.0.0-${{ env.SHORT_SHA }}.tgz
          if-no-files-found: error
