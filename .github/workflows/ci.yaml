name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.2
          cache: true

      - name: Go test
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: helm lint charts/es-refresh-healer

      - name: Helm template smoke test
        run: helm template es-refresh-healer charts/es-refresh-healer --set image.tag="${GITHUB_SHA::7}"

      - name: Docker build validation
        run: docker build -t es-refresh-healer:${GITHUB_SHA::7} .
