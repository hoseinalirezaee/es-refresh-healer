name: e2e

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  kind:
    name: kind ${{ matrix.kubernetes }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - kubernetes: v1.35.1
            node_image: kindest/node:v1.35.1
            cluster_name: es-refresh-healer-1351
          - kubernetes: v1.34.3
            node_image: kindest/node:v1.34.3
            cluster_name: es-refresh-healer-1343
          - kubernetes: v1.33.4
            node_image: kindest/node:v1.33.4
            cluster_name: es-refresh-healer-1334
          - kubernetes: v1.32.8
            node_image: kindest/node:v1.32.8
            cluster_name: es-refresh-healer-1328

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ matrix.cluster_name }}
          node_image: ${{ matrix.node_image }}
          wait: 120s

      - name: Run E2E
        env:
          CLUSTER_NAME: ${{ matrix.cluster_name }}
          IMAGE_REPOSITORY: es-refresh-healer
          IMAGE_TAG: e2e-${{ matrix.kubernetes }}
        run: bash scripts/e2e-kind.sh

