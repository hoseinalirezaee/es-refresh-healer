name: e2e

on:
  workflow_run:
    workflows:
      - chart
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  delivery:
    name: require published image and chart
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      head_sha: ${{ steps.refs.outputs.head_sha }}
      short_sha: ${{ steps.refs.outputs.short_sha }}
      image_repository: ${{ steps.refs.outputs.image_repository }}
      chart_repository_url: ${{ steps.refs.outputs.chart_repository_url }}
      chart_version: ${{ steps.refs.outputs.chart_version }}
    steps:
      - name: Resolve delivery refs
        id: refs
        env:
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          head_sha="${WORKFLOW_RUN_HEAD_SHA:-$GITHUB_SHA}"
          short_sha="${head_sha::7}"
          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          chart_repository_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          chart_version="0.0.0-${short_sha}"

          {
            echo "head_sha=${head_sha}"
            echo "short_sha=${short_sha}"
            echo "image_repository=${image_repository}"
            echo "chart_repository_url=${chart_repository_url}"
            echo "chart_version=${chart_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Require image workflow success
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.refs.outputs.head_sha }}
        run: |
          for attempt in $(seq 1 40); do
            run_state="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow image.yaml \
              --commit "$HEAD_SHA" \
              --limit 1 \
              --json status,conclusion,url \
              --jq '.[0] // empty | [.status, (.conclusion // ""), .url] | @tsv')"

            if [[ -n "$run_state" ]]; then
              IFS=$'\t' read -r status conclusion url <<< "$run_state"
              echo "image workflow: status=${status} conclusion=${conclusion} url=${url}"
              if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
                exit 0
              fi
              if [[ "$status" == "completed" ]]; then
                echo "image workflow did not pass"
                exit 1
              fi
            fi

            sleep 15
          done

          echo "timed out waiting for image workflow"
          exit 1

      - name: Require chart workflow success
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.refs.outputs.head_sha }}
        run: |
          for attempt in $(seq 1 40); do
            run_state="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow chart.yaml \
              --commit "$HEAD_SHA" \
              --limit 1 \
              --json status,conclusion,url \
              --jq '.[0] // empty | [.status, (.conclusion // ""), .url] | @tsv')"

            if [[ -n "$run_state" ]]; then
              IFS=$'\t' read -r status conclusion url <<< "$run_state"
              echo "chart workflow: status=${status} conclusion=${conclusion} url=${url}"
              if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
                exit 0
              fi
              if [[ "$status" == "completed" ]]; then
                echo "chart workflow did not pass"
                exit 1
              fi
            fi

            sleep 15
          done

          echo "timed out waiting for chart workflow"
          exit 1

      - name: Require published image tag
        run: |
          docker buildx imagetools inspect \
            "${{ steps.refs.outputs.image_repository }}:${{ steps.refs.outputs.short_sha }}"

      - name: Require published chart version
        run: |
          for attempt in $(seq 1 40); do
            if curl -fsSL "${{ steps.refs.outputs.chart_repository_url }}/index.yaml" \
              | grep -q "version: ${{ steps.refs.outputs.chart_version }}"; then
              exit 0
            fi
            sleep 15
          done

          echo "timed out waiting for chart repository version ${{ steps.refs.outputs.chart_version }}"
          exit 1

  kind:
    name: kind ${{ matrix.kubernetes }}
    runs-on: ubuntu-latest
    needs:
      - delivery
    strategy:
      fail-fast: false
      matrix:
        include:
          - kubernetes: v1.35.1
            node_image: kindest/node:v1.35.1
            cluster_name: es-refresh-healer-1351
          - kubernetes: v1.34.3
            node_image: kindest/node:v1.34.3
            cluster_name: es-refresh-healer-1343
          - kubernetes: v1.33.4
            node_image: kindest/node:v1.33.4
            cluster_name: es-refresh-healer-1334
          - kubernetes: v1.32.8
            node_image: kindest/node:v1.32.8
            cluster_name: es-refresh-healer-1328

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.delivery.outputs.head_sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ matrix.cluster_name }}
          node_image: ${{ matrix.node_image }}
          wait: 120s

      - name: Run E2E
        env:
          CLUSTER_NAME: ${{ matrix.cluster_name }}
          BUILD_CONTROLLER_IMAGE: "false"
          IMAGE_REPOSITORY: ${{ needs.delivery.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.delivery.outputs.short_sha }}
          IMAGE_PULL_POLICY: Always
          HELM_REPOSITORY_NAME: es-refresh-healer
          HELM_REPOSITORY_URL: ${{ needs.delivery.outputs.chart_repository_url }}
          HELM_CHART_REF: es-refresh-healer/es-refresh-healer
          HELM_CHART_VERSION: ${{ needs.delivery.outputs.chart_version }}
        run: bash scripts/e2e-kind.sh
